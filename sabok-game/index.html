<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김복지의 야망: 사회복지사 키우기</title>
    <!-- React, ReactDOM, and Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        * {
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            background: #87CEEB;
        }

        #root {
            min-height: 100vh;
            width: 100%;
        }

        .gold-frame {
            border: 4px solid #D4AF37;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            background: white;
        }

        .work-button {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: 4px solid #8B4513;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s;
            margin: 0 auto;
            box-shadow: 0 6px 0 #8B4513, 0 8px 15px rgba(0, 0, 0, 0.3);
        }

        .work-button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #8B4513, 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-100px);
            }
        }

        .floating-number {
            animation: floatUp 1s ease-out forwards;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const HomeIcon = () => <span>🏠</span>;
        const AwardIcon = () => <span>🏆</span>;
        const BriefcaseIcon = () => <span>💼</span>;
        const TrendingUpIcon = () => <span>📈</span>;

        function RaiseSocialWorker() {
            const [currentScreen, setCurrentScreen] = useState('character-select');
            const [gender, setGender] = useState(null);
            const [userId, setUserId] = useState(null);

            // Core State
            const [experience, setExperience] = useState(0);
            const [level, setLevel] = useState(1);
            const [money, setMoney] = useState(450);
            const [clickPower, setClickPower] = useState(1);
            const [autoIncome, setAutoIncome] = useState(0);
            const [totalClicks, setTotalClicks] = useState(0);

            // Progression
            const [casesCompleted, setCasesCompleted] = useState({ child: 0, elderly: 0, disability: 0, mental: 0, family: 0 });
            const [skills, setSkills] = useState({ empathy: 0, documentation: 0, networking: 0, counseling: 0, crisis: 0 });
            const [equipment, setEquipment] = useState({ chair: 0, computer: 0, coffee: 0, bookshelf: 0, plant: 0, sofa: 0 });

            const [floatingNumbers, setFloatingNumbers] = useState([]);
            const [currentCase, setCurrentCase] = useState(null);

            const caseTypes = [
                { id: 'child', name: '아동복지', icon: '👶', color: 'from-pink-400 to-rose-500', bonus: 1.2 },
                { id: 'elderly', name: '노인복지', icon: '👴', color: 'from-amber-400 to-orange-500', bonus: 1.3 },
                { id: 'disability', name: '장애인복지', icon: '♿', color: 'from-blue-400 to-indigo-500', bonus: 1.4 },
                { id: 'mental', name: '정신건강', icon: '🧠', color: 'from-purple-400 to-violet-500', bonus: 1.5 },
                { id: 'family', name: '가족복지', icon: '👨‍👩‍👧‍👦', color: 'from-green-400 to-emerald-500', bonus: 1.3 }
            ];

            const ranks = [
                { name: '인턴', minLevel: 1 },
                { name: '사회복지사', minLevel: 10 },
                { name: '선임 사회복지사', minLevel: 20 },
                { name: '팀장', minLevel: 30 },
                { name: '과장', minLevel: 40 },
                { name: '부장', minLevel: 50 },
                { name: '센터장', minLevel: 60 }
            ];

            const getCurrentRank = () => [...ranks].reverse().find(r => level >= r.minLevel) || ranks[0];

            useEffect(() => {
                let id = localStorage.getItem('socialWorkerUserId') || 'user_' + Date.now();
                localStorage.setItem('socialWorkerUserId', id);
                setUserId(id);

                const saved = localStorage.getItem(`gameData_${id}`);
                if (saved) {
                    const d = JSON.parse(saved);
                    if (d.gender) {
                        setGender(d.gender);
                        setExperience(d.experience || 0);
                        setLevel(d.level || 1);
                        setMoney(d.money || 450);
                        setClickPower(d.clickPower || 1);
                        setAutoIncome(d.autoIncome || 0);
                        setTotalClicks(d.totalClicks || 0);
                        setSkills(d.skills || d.skills);
                        setEquipment(d.equipment || d.equipment);
                        setCasesCompleted(d.casesCompleted || d.casesCompleted);
                        setCurrentScreen('game');
                    }
                }
            }, []);

            const save = useCallback(() => {
                if (!userId) return;
                localStorage.setItem(`gameData_${userId}`, JSON.stringify({
                    gender, experience, level, money, clickPower, autoIncome, totalClicks, skills, equipment, casesCompleted
                }));
            }, [userId, gender, experience, level, money, clickPower, autoIncome, totalClicks, skills, equipment, casesCompleted]);

            useEffect(() => {
                const interval = setInterval(save, 10000);
                return () => clearInterval(interval);
            }, [save]);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (autoIncome > 0) {
                        setExperience(p => p + autoIncome);
                        setMoney(p => p + autoIncome * 0.5);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, [autoIncome]);

            useEffect(() => {
                const needed = level * 1000;
                if (experience >= needed) {
                    setExperience(p => p - needed);
                    setLevel(p => p + 1);
                    setMoney(p => p + (level + 1) * 100);
                }
            }, [experience, level]);

            useEffect(() => {
                const timer = setInterval(() => {
                    if (!currentCase && Math.random() > 0.7) {
                        setCurrentCase(caseTypes[Math.floor(Math.random() * caseTypes.length)]);
                    }
                }, 5000);
                return () => clearInterval(timer);
            }, [currentCase]);

            const handleWork = () => {
                const bonus = currentCase ? currentCase.bonus : 1;
                const earnings = clickPower * bonus;
                setExperience(p => p + earnings);
                setMoney(p => p + earnings * 0.5);
                setTotalClicks(p => p + 1);

                if (currentCase) {
                    setCasesCompleted(p => ({ ...p, [currentCase.id]: p[currentCase.id] + 1 }));
                    setCurrentCase(null);
                }

                const id = Date.now();
                setFloatingNumbers(p => [...p, { id, value: `+${Math.floor(earnings)}`, x: (Math.random() - 0.5) * 100 }]);
                setTimeout(() => setFloatingNumbers(p => p.filter(n => n.id !== id)), 1000);
            };

            const upgradeSkill = (id, cost, inc) => {
                if (money >= cost) {
                    setMoney(p => p - cost);
                    setSkills(p => ({ ...p, [id]: p[id] + 1 }));
                    if (id === 'empathy') setClickPower(p => p + inc);
                    if (id === 'documentation') setAutoIncome(p => p + inc);
                }
            };

            if (currentScreen === 'character-select') {
                return (
                    <div className="min-h-screen bg-amber-50 flex flex-col items-center justify-center p-4">
                        <h1 className="text-3xl font-black text-amber-900 mb-8 px-6 py-3 bg-white border-4 border-amber-900 rounded-xl shadow-lg">캐릭터를 선택하세요</h1>
                        <div className="grid grid-cols-2 gap-6 w-full max-w-md">
                            <button onClick={() => { setGender('male'); setCurrentScreen('game'); save(); }} className="bg-white border-4 border-blue-400 p-6 rounded-2xl shadow-xl hover:scale-105 transition-transform">
                                <div className="text-6xl mb-4">👦</div>
                                <div className="font-bold text-blue-600">남자 사회복지사</div>
                            </button>
                            <button onClick={() => { setGender('female'); setCurrentScreen('game'); save(); }} className="bg-white border-4 border-pink-400 p-6 rounded-2xl shadow-xl hover:scale-105 transition-transform">
                                <div className="text-6xl mb-4">👧</div>
                                <div className="font-bold text-pink-600">여자 사회복지사</div>
                            </button>
                        </div>
                    </div>
                );
            }

            const rank = getCurrentRank();
            const expNeeded = level * 1000;
            const progress = (experience / expNeeded) * 100;

            return (
                <div className="min-h-screen bg-sky-200 flex flex-col pb-24">
                    {/* Header Status */}
                    <div className="bg-white border-b-4 border-amber-900 p-4 sticky top-0 z-10">
                        <div className="flex justify-between items-center mb-2">
                            <div>
                                <div className="text-xl font-black text-amber-900">김복지의 야망</div>
                                <div className="text-sm font-bold text-blue-600">{rank.name} (Lv.{level})</div>
                            </div>
                            <div className="text-right">
                                <div className="text-2xl font-black text-emerald-600">💰 {Math.floor(money).toLocaleString()}원</div>
                                <button onClick={save} className="text-xs font-bold text-gray-400">자동 저장 중...</button>
                            </div>
                        </div>
                        <div className="w-full h-4 bg-gray-200 rounded-full overflow-hidden border-2 border-amber-900">
                            <div className="h-full bg-emerald-400 transition-all" style={{ width: `${progress}%` }} />
                        </div>
                    </div>

                    <div className="p-4 space-y-4 max-w-lg mx-auto w-full">
                        {currentScreen === 'game' && (
                            <>
                                {currentCase && (
                                    <div className={`p-4 rounded-xl bg-gradient-to-r ${currentCase.color} text-white animate-bounce shadow-lg flex justify-between items-center`}>
                                        <div className="flex items-center gap-3">
                                            <span className="text-3xl">{currentCase.icon}</span>
                                            <div>
                                                <div className="font-black">긴급! {currentCase.name}</div>
                                                <div className="text-xs">이동 클릭 시 보너스 경험치!</div>
                                            </div>
                                        </div>
                                        <div className="text-xl font-black">×{currentCase.bonus}</div>
                                    </div>
                                )}

                                <div className="gold-frame p-8 relative min-h-[300px] flex flex-col items-center justify-center">
                                    {floatingNumbers.map(n => (
                                        <div key={n.id} className="absolute font-black text-3xl text-emerald-600 floating-number" style={{ left: `calc(50% + ${n.x}px)`, top: '40%' }}>
                                            {n.value}
                                        </div>
                                    ))}
                                    <div className="text-8xl mb-8 select-none">
                                        {gender === 'male' ? '🧔' : '👩‍💼'}
                                    </div>
                                    <button onClick={handleWork} className="work-button">
                                        <span className="text-2xl font-black text-amber-900">업무</span>
                                    </button>
                                    <div className="mt-4 text-center text-sm font-bold text-amber-900">
                                        클릭당 +{clickPower} | 초당 +{autoIncome}
                                    </div>
                                </div>

                                <div className="gold-frame p-4">
                                    <h3 className="font-black text-amber-900 mb-2">스킬 업그레이드</h3>
                                    <div className="space-y-2">
                                        <button onClick={() => upgradeSkill('empathy', (skills.empathy + 1) * 200, 2)} className="w-full flex justify-between p-3 bg-amber-50 rounded-lg border-2 border-amber-200">
                                            <span>❤️ 공감능력 (Lv.{skills.empathy})</span>
                                            <span className="font-bold">💰 {(skills.empathy + 1) * 200}</span>
                                        </button>
                                        <button onClick={() => upgradeSkill('documentation', (skills.documentation + 1) * 300, 5)} className="w-full flex justify-between p-3 bg-amber-50 rounded-lg border-2 border-amber-200">
                                            <span>📄 문서작성 (Lv.{skills.documentation})</span>
                                            <span className="font-bold">💰 {(skills.documentation + 1) * 300}</span>
                                        </button>
                                    </div>
                                </div>
                            </>
                        )}

                        {currentScreen === 'stats' && (
                            <div className="gold-frame p-6 space-y-4">
                                <h2 className="text-2xl font-black text-amber-900">내 실적 데이터</h2>
                                <div className="grid grid-cols-2 gap-2 text-sm">
                                    <div className="bg-amber-50 p-3 rounded-lg"><b>총 클릭</b><br />{totalClicks.toLocaleString()}회</div>
                                    <div className="bg-amber-50 p-3 rounded-lg"><b>직급</b><br />{rank.name}</div>
                                    {Object.entries(casesCompleted).map(([k, v]) => (
                                        <div key={k} className="bg-amber-50 p-3 rounded-lg capitalize"><b>{k}</b><br />{v}건</div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Navbar */}
                    <div className="fixed bottom-0 left-0 right-0 bg-amber-900 border-t-4 border-amber-950 p-4 flex justify-around">
                        <button onClick={() => setCurrentScreen('game')} className={`text-white flex flex-col items-center ${currentScreen === 'game' ? 'opacity-100' : 'opacity-50'}`}>
                            <HomeIcon /> <span className="text-xs font-bold">집</span>
                        </button>
                        <button onClick={() => setCurrentScreen('stats')} className={`text-white flex flex-col items-center ${currentScreen === 'stats' ? 'opacity-100' : 'opacity-50'}`}>
                            <AwardIcon /> <span className="text-xs font-bold">통계</span>
                        </button>
                        <button onClick={() => { if (confirm('게임을 초기화하시겠습니까?')) { localStorage.clear(); window.location.reload(); } }} className="text-white flex flex-col items-center opacity-50">
                            <TrendingUpIcon /> <span className="text-xs font-bold">초기화</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RaiseSocialWorker />);
    </script>
</body>

</html>
