<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김복지의 야망: 사회복지사 키우기</title>
    <!-- React, ReactDOM, and Babel Standalone -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        * {
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #87CEEB;
        }

        #root {
            height: 100vh;
            width: 100%;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // Mock Lucide components since we can't easily use them as React components via CDN without extra setup
        const Home = () => <span>🏠</span>;
        const TrendingUp = () => <span>📈</span>;
        const Award = () => <span>🏆</span>;
        const Briefcase = () => <span>💼</span>;
        const X = () => <span>✕</span>;

        /* --- Game Logic Starts Here --- */
        function RaiseSocialWorker() {
            const [currentScreen, setCurrentScreen] = useState('character-select');
            const [gender, setGender] = useState(null);
            const [userId, setUserId] = useState(null);

            // 게임 상태
            const [experience, setExperience] = useState(0);
            const [level, setLevel] = useState(1);
            const [money, setMoney] = useState(450);
            const [clickPower, setClickPower] = useState(1);
            const [autoIncome, setAutoIncome] = useState(0);
            const [totalClicks, setTotalClicks] = useState(0);

            // 케이스 시스템
            const [currentCase, setCurrentCase] = useState(null);
            const [casesCompleted, setCasesCompleted] = useState({
                child: 0,
                elderly: 0,
                disability: 0,
                mental: 0,
                family: 0
            });

            // 미니게임
            const [activeMinigame, setActiveMinigame] = useState(null);
            const [minigameData, setMinigameData] = useState(null);

            // 업그레이드
            const [skills, setSkills] = useState({
                empathy: 0,
                documentation: 0,
                networking: 0,
                counseling: 0,
                crisis: 0
            });

            const [equipment, setEquipment] = useState({
                chair: 0,
                computer: 0,
                coffee: 0,
                bookshelf: 0,
                plant: 0,
                sofa: 0
            });

            const [clickAnimation, setClickAnimation] = useState(false);
            const [floatingNumbers, setFloatingNumbers] = useState([]);
            const [showSaveIndicator, setShowSaveIndicator] = useState(false);

            // 직급 정보
            const ranks = [
                { name: '인턴', minLevel: 1, salary: 50, office: 'starter' },
                { name: '사회복지사', minLevel: 10, salary: 100, office: 'basic' },
                { name: '선임 사회복지사', minLevel: 20, salary: 200, office: 'intermediate' },
                { name: '팀장', minLevel: 30, salary: 400, office: 'advanced' },
                { name: '과장', minLevel: 40, salary: 800, office: 'manager' },
                { name: '부장', minLevel: 50, salary: 1600, office: 'senior' },
                { name: '센터장', minLevel: 60, salary: 3200, office: 'director' }
            ];

            const getCurrentRank = () => {
                return [...ranks].reverse().find(r => level >= r.minLevel) || ranks[0];
            };

            // 케이스 타입
            const caseTypes = [
                { id: 'child', name: '아동복지', icon: '👶', color: 'from-pink-400 to-rose-500', bonus: 1.2, description: '아동 보호 및 지원' },
                { id: 'elderly', name: '노인복지', icon: '👴', color: 'from-amber-400 to-orange-500', bonus: 1.3, description: '노인 돌봄 서비스' },
                { id: 'disability', name: '장애인복지', icon: '♿', color: 'from-blue-400 to-indigo-500', bonus: 1.4, description: '장애인 지원 서비스' },
                { id: 'mental', name: '정신건강', icon: '🧠', color: 'from-purple-400 to-violet-500', bonus: 1.5, description: '정신건강 상담' },
                { id: 'family', name: '가족복지', icon: '👨‍👩‍👧‍👦', color: 'from-green-400 to-emerald-500', bonus: 1.3, description: '가족 지원 서비스' }
            ];

            // 스킬 정보
            const skillsData = [
                { id: 'empathy', name: '공감능력', icon: '❤️', description: '클릭 파워 +5', cost: (lvl) => Math.floor(150 * Math.pow(1.5, lvl)) },
                { id: 'documentation', name: '문서작성', icon: '📄', description: '자동 수입 +10', cost: (lvl) => Math.floor(200 * Math.pow(1.6, lvl)) },
                { id: 'networking', name: '네트워킹', icon: '🤝', description: '경험치 +15%', cost: (lvl) => Math.floor(300 * Math.pow(1.7, lvl)) },
                { id: 'counseling', name: '상담기술', icon: '💬', description: '케이스 보너스 +10%', cost: (lvl) => Math.floor(250 * Math.pow(1.6, lvl)) },
                { id: 'crisis', name: '위기개입', icon: '🚨', description: '특수 케이스 보너스 +20%', cost: (lvl) => Math.floor(400 * Math.pow(1.8, lvl)) }
            ];

            // 장비 정보
            const equipmentData = [
                { id: 'chair', name: '좋은 의자', icon: '💺', description: '편안함 +20%', cost: (lvl) => Math.floor(100 * Math.pow(1.4, lvl)) },
                { id: 'computer', name: '빠른 컴퓨터', icon: '💻', description: '자동 수입 +15', cost: (lvl) => Math.floor(250 * Math.pow(1.5, lvl)) },
                { id: 'coffee', name: '커피머신', icon: '☕', description: '클릭 파워 +10', cost: (lvl) => Math.floor(500 * Math.pow(1.6, lvl)) },
                { id: 'bookshelf', name: '전문서적', icon: '📚', description: '경험치 +10%', cost: (lvl) => Math.floor(800 * Math.pow(1.7, lvl)) },
                { id: 'plant', name: '관엽식물', icon: '🪴', description: '행복도 +5%', cost: (lvl) => Math.floor(300 * Math.pow(1.4, lvl)) },
                { id: 'sofa', name: '상담 소파', icon: '🛋️', description: '상담 효율 +25%', cost: (lvl) => Math.floor(1000 * Math.pow(1.8, lvl)) }
            ];

            // 초기화
            useEffect(() => {
                let storedUserId = localStorage.getItem('socialWorkerUserId');
                if (!storedUserId) {
                    storedUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    localStorage.setItem('socialWorkerUserId', storedUserId);
                }
                setUserId(storedUserId);

                // 저장된 게임 데이터 로드
                const savedData = localStorage.getItem(`gameData_${storedUserId}`);
                if (savedData) {
                    const data = JSON.parse(savedData);
                    setGender(data.gender);
                    setExperience(data.experience || 0);
                    setLevel(data.level || 1);
                    setMoney(data.money || 450);
                    setClickPower(data.clickPower || 1);
                    setAutoIncome(data.autoIncome || 0);
                    setTotalClicks(data.totalClicks || 0);
                    setSkills(data.skills || { empathy: 0, documentation: 0, networking: 0, counseling: 0, crisis: 0 });
                    setEquipment(data.equipment || { chair: 0, computer: 0, coffee: 0, bookshelf: 0, plant: 0, sofa: 0 });
                    setCasesCompleted(data.casesCompleted || { child: 0, elderly: 0, disability: 0, mental: 0, family: 0 });

                    if (data.gender) {
                        setCurrentScreen('game');
                    }
                }
            }, []);

            // 게임 데이터 저장
            const saveGameData = useCallback(() => {
                if (!userId) return;

                const gameData = {
                    gender, experience, level, money, clickPower, autoIncome, totalClicks, skills, equipment, casesCompleted,
                    lastSaved: Date.now()
                };

                localStorage.setItem(`gameData_${userId}`, JSON.stringify(gameData));

                setShowSaveIndicator(true);
                setTimeout(() => setShowSaveIndicator(false), 2000);
            }, [userId, gender, experience, level, money, clickPower, autoIncome, totalClicks, skills, equipment, casesCompleted]);

            // 자동 저장 (30초마다)
            useEffect(() => {
                if (userId && gender) {
                    const interval = setInterval(() => {
                        saveGameData();
                    }, 30000);
                    return () => clearInterval(interval);
                }
            }, [userId, gender, saveGameData]);

            // 자동 수입
            useEffect(() => {
                if (autoIncome > 0) {
                    const interval = setInterval(() => {
                        setExperience(prev => prev + autoIncome);
                        setMoney(prev => prev + autoIncome * 0.5);
                    }, 1000);
                    return () => clearInterval(interval);
                }
            }, [autoIncome]);

            // 레벨업 체크
            useEffect(() => {
                const expNeeded = level * 1000;
                if (experience >= expNeeded) {
                    setExperience(prev => prev - expNeeded);
                    setLevel(prev => {
                        const newLevel = prev + 1;
                        // 레벨업 시 보상
                        setMoney(m => m + newLevel * 100);
                        return newLevel;
                    });
                }
            }, [experience, level]);

            // 랜덤 케이스 생성
            useEffect(() => {
                const scheduleNextCase = () => {
                    const randomDelay = Math.random() * 12000 + 3000;
                    setTimeout(() => {
                        if (!currentCase && Math.random() > 0.2) {
                            const randomCase = caseTypes[Math.floor(Math.random() * caseTypes.length)];
                            setCurrentCase(randomCase);
                        }
                        scheduleNextCase();
                    }, randomDelay);
                };
                scheduleNextCase();
            }, []);

            // 클릭 핸들러
            const handleWork = (e) => {
                const baseEarnings = clickPower * (1 + skills.networking * 0.15);
                const caseBonus = currentCase ? currentCase.bonus : 1;
                const counselingBonus = 1 + skills.counseling * 0.1;
                const earnings = baseEarnings * caseBonus * counselingBonus;

                setExperience(prev => prev + earnings);
                setMoney(prev => prev + earnings * 0.5);
                setTotalClicks(prev => prev + 1);

                if (currentCase) {
                    setCasesCompleted(prev => ({ ...prev, [currentCase.id]: prev[currentCase.id] + 1 }));
                    setCurrentCase(null);
                }

                setClickAnimation(true);
                setTimeout(() => setClickAnimation(false), 200);

                const id = Date.now();
                setFloatingNumbers(prev => [...prev, { id, value: `+${Math.floor(earnings)}`, x: Math.random() * 200 - 100, y: -50 }]);
                setTimeout(() => setFloatingNumbers(prev => prev.filter(n => n.id !== id)), 1000);
            };

            const upgradeSkill = (skillId) => {
                const skill = skillsData.find(s => s.id === skillId);
                const cost = skill.cost(skills[skillId]);
                if (money >= cost) {
                    setMoney(prev => prev - cost);
                    setSkills(prev => ({ ...prev, [skillId]: prev[skillId] + 1 }));
                    if (skillId === 'empathy') setClickPower(prev => prev + 5);
                    if (skillId === 'documentation') setAutoIncome(prev => prev + 10);
                }
            };

            const upgradeEquipment = (equipId) => {
                const equip = equipmentData.find(e => e.id === equipId);
                const cost = equip.cost(equipment[equipId]);
                if (money >= cost) {
                    setMoney(prev => prev - cost);
                    setEquipment(prev => ({ ...prev, [equipId]: prev[equipId] + 1 }));
                    if (equipId === 'computer') setAutoIncome(prev => prev + 15);
                    if (equipId === 'coffee') setClickPower(prev => prev + 10);
                }
            };

            // 미니게임 시작 시간 (쿨타임용)
            const [lastMinigameTime, setLastMinigameTime] = useState(0);
            const [cooldownRemaining, setCooldownRemaining] = useState(0);

            // 쿨타임 타이머
            useEffect(() => {
                const timer = setInterval(() => {
                    if (lastMinigameTime > 0) {
                        const now = Date.now();
                        const diff = Math.floor((now - lastMinigameTime) / 1000);
                        const remaining = Math.max(0, 60 - diff);
                        setCooldownRemaining(remaining);
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [lastMinigameTime]);

            const startMinigame = (gameType) => {
                if (cooldownRemaining > 0) {
                    alert(`${cooldownRemaining}초 후에 다시 시도할 수 있습니다.`);
                    return;
                }

                if (gameType === 'counseling') {
                    const scenarios = [
                        { question: '독거어르신이 "사는 게 의미가 없네"라며 우울해하십니다.', options: [{ text: '"힘내세요, 좋은 일 있을 거예요"', correct: false, feedback: '막연한 격려는 오히려 소외감을 줄 수 있습니다.' }, { text: '"그런 마음이 드시는군요. 구체적으로 어떤 점이 힘드신지 들어볼 수 있을까요?"', correct: true, feedback: '경청과 감정 수용은 상담의 기본입니다!' }, { text: '"운동을 해보시는 건 어때요?"', correct: false, feedback: '해결책 제시보다는 공감이 우선입니다.' }] },
                        { question: '아동의 몸에서 멍 자국을 발견했습니다. 학대가 의심됩니다.', options: [{ text: '즉시 아동보호전문기관이나 경찰에 신고', correct: true, feedback: '사회복지사는 아동학대 신고 의무자입니다!' }, { text: '부모님께 전화를 걸어 확인', correct: false, feedback: '증거 인멸이나 아동에게 추가 위험이 생길 수 있습니다.' }, { text: '일단 며칠 더 지켜보기로 함', correct: false, feedback: '의심되는 즉시 신고해야 합니다.' }] },
                        { question: '장애인 등록 절차를 물어보는 민원인이 오셨습니다.', options: [{ text: '근무지 근처 병원 안내', correct: false, feedback: '지정된 진단 기관이 필요합니다.' }, { text: '주민센터 방문하여 신청서 접수 및 진단서 제출 안내', correct: true, feedback: '정확한 행정 절차 안내입니다!' }, { text: '전화번호만 주고 나중에 연락하라고 함', correct: false, feedback: '적극적인 정보 제공이 필요합니다.' }] },
                        { question: '알코올 의존 증세가 있는 클라이언트가 상담을 거부합니다.', options: [{ text: '강제로 병원에 입원시킴', correct: false, feedback: '법적 절차와 동의 없는 강제 입원은 위험합니다.' }, { text: '라포 형성을 위해 단기 목표부터 차근차근 접근', correct: true, feedback: '신뢰 관계 형성이 가장 우선입니다!' }, { text: '의지가 없으니 상담 종결', correct: false, feedback: '필요한 서비스를 지속적으로 제안해야 합니다.' }] },
                        { question: '다문화 가정 아이가 한국어 부족으로 학교 적응에 힘들어합니다.', options: [{ text: '다문화가족지원센터의 한국어 교육 프로그램 연계', correct: true, feedback: '적절한 자원 연계입니다!' }, { text: '아이에게 공부를 더 열심히 하라고 함', correct: false, feedback: '심리적 압박을 줄 수 있습니다.' }, { text: '외국인 학교로 전학 권유', correct: false, feedback: '분리보다는 통합이 우선입니다.' }] },
                        { question: '노숙인이 추운 겨울에 거리에서 잠을 자려 합니다.', options: [{ text: '돈을 주고 알아서 자라고 함', correct: false, feedback: '근본적인 해결이 되지 않습니다.' }, { text: '인근 일시보호소나 쉼터로 긴급 입소 연계', correct: true, feedback: '동절기 긴급 보호가 최우선입니다!' }, { text: '추우니까 집에 가라고 함', correct: false, feedback: '주거가 없는 상황을 고려해야 합니다.' }] },
                        { question: '청소년이 가출을 고민하며 상담을 요청했습니다.', options: [{ text: '무조건 참으라고 훈계함', correct: false, feedback: '갈등 원인을 파악해야 합니다.' }, { text: '가출 경험이 있는지 묻고 위험성 및 쉼터 안내', correct: true, feedback: '안전 확보와 현실적인 대안 공유가 중요합니다!' }, { text: '부모님께 바로 일러바침', correct: false, feedback: '비밀 보장 원칙과 신뢰가 깨지기 쉽습니다.' }] },
                        { question: '만성질환으로 병원비 부담이 큰 클라이언트가 있습니다.', options: [{ text: '긴급복지지원제도 및 의료비 지원 사업 안내', correct: true, feedback: '경제적 부담 완화를 위한 제도 안내입니다!' }, { text: '아르바이트를 구해보라고 함', correct: false, feedback: '건강 상태를 먼저 고려해야 합니다.' }, { text: '병원을 옮기라고 함', correct: false, feedback: '근본적인 문제 해결이 아닙니다.' }] },
                        { question: '치매 어르신을 돌보는 보호자가 심각한 스트레스를 호소합니다.', options: [{ text: '시설 입소만 강력하게 권유', correct: false, feedback: '보호자의 다양한 욕구를 확인해야 합니다.' }, { text: '재가 노인복지 서비스 및 보호자 자조 모임 안내', correct: true, feedback: '보호자의 부양 부담 경감이 필요합니다!' }, { text: '"누구나 다 겪는 일"이라며 위로', correct: false, feedback: '고통을 축소시키는 표현입니다.' }] },
                        { question: '한부모 가정이 갑작스러운 실직으로 생계가 막막해졌습니다.', options: [{ text: '기초생활수급 신청 및 긴급 지원 연계', correct: true, feedback: '생존권 보장이 최우선입니다!' }, { text: '나중에 일 구하면 오라고 함', correct: false, feedback: '긴급한 위기 상황을 방치하는 것입니다.' }, { text: '아이를 보육 시설에 맡기라고 함', correct: false, feedback: '가족 해체를 우선 권해서는 안 됩니다.' }] },

                            </div>

                            <div className="gold-frame p-4"><h2 className="text-2xl font-black text-amber-900 mb-4 flex items-center gap-2"><Award />스킬</h2><div className="space-y-3">{skillsData.map(skill => { const currentLvl = skills[skill.id]; const cost = skill.cost(currentLvl); const canAfford = money >= cost; return <button key={skill.id} onClick={() => upgradeSkill(skill.id)} disabled={!canAfford} className={`w-full p-4 rounded-lg border-4 transition-all ${canAfford ? 'bg-gradient-to-r from-green-500 to-emerald-600 border-green-700 hover:scale-102' : 'bg-gray-400 border-gray-600 opacity-50'}`}><div className="flex items-center justify-between"><div className="flex items-center gap-3"><div className="text-3xl">{skill.icon}</div><div className="text-left"><div className="font-bold text-white text-lg">{skill.name}</div><div className="text-sm text-gray-100">{skill.description}</div></div></div><div className="text-right"><div className="text-2xl font-black text-yellow-300">Lv.{currentLvl}</div><div className="text-sm font-bold text-yellow-200">💰 {cost}</div></div></div></button>; })}</div></div>

                            <div className="gold-frame p-4"><h2 className="text-2xl font-black text-amber-900 mb-4 flex items-center gap-2"><Briefcase />사무실 장비</h2><div className="space-y-3">{equipmentData.map(equip => { const currentLvl = equipment[equip.id]; const cost = equip.cost(currentLvl); const canAfford = money >= cost; return <button key={equip.id} onClick={() => upgradeEquipment(equip.id)} disabled={!canAfford} className={`w-full p-4 rounded-lg border-4 transition-all ${canAfford ? 'bg-gradient-to-r from-blue-500 to-indigo-600 border-blue-700 hover:scale-102' : 'bg-gray-400 border-gray-600 opacity-50'}`}><div className="flex items-center justify-between"><div className="flex items-center gap-3"><div className="text-3xl">{equip.icon}</div><div className="text-left"><div className="font-bold text-white text-lg">{equip.name}</div><div className="text-sm text-gray-100">{equip.description}</div></div></div><div className="text-right"><div className="text-2xl font-black text-yellow-300">Lv.{currentLvl}</div><div className="text-sm font-bold text-yellow-200">💰 {cost}</div></div></div></button>; })}</div></div>
                        </div>
                    )}

                    {currentScreen === 'stats' && (
                        <div className="gold-frame p-6">
                            <h2 className="text-2xl font-black text-amber-900 mb-6 flex items-center gap-2"><TrendingUp />통계</h2>
                            <div className="space-y-4">
                                <div className="bg-gradient-to-r from-purple-100 to-pink-100 p-4 rounded-lg border-4 border-purple-300"><div className="flex justify-between items-center"><span className="font-bold text-purple-900">현재 레벨</span><span className="text-2xl font-black text-purple-700">{level}</span></div></div>
                                <div className="bg-gradient-to-r from-blue-100 to-cyan-100 p-4 rounded-lg border-4 border-blue-300"><div className="flex justify-between items-center"><span className="font-bold text-blue-900">직급</span><span className="text-xl font-black text-blue-700">{currentRank.name}</span></div></div>
                                <div className="bg-gradient-to-r from-green-100 to-emerald-100 p-4 rounded-lg border-4 border-green-300"><div className="flex justify-between items-center"><span className="font-bold text-green-900">클릭 파워</span><span className="text-2xl font-black text-green-700">+{clickPower}</span></div></div>
                                <div className="bg-gradient-to-r from-yellow-100 to-orange-100 p-4 rounded-lg border-4 border-yellow-300"><div className="flex justify-between items-center"><span className="font-bold text-orange-900">자동 수입</span><span className="text-2xl font-black text-orange-700">+{autoIncome}/초</span></div></div>
                                <div className="bg-gradient-to-r from-indigo-100 to-purple-100 p-4 rounded-lg border-4 border-indigo-300"><div className="flex justify-between items-center"><span className="font-bold text-indigo-900">총 클릭</span><span className="text-2xl font-black text-indigo-700">{totalClicks.toLocaleString()}</span></div></div>
                                <div className="bg-gradient-to-r from-pink-100 to-rose-100 p-4 rounded-lg border-4 border-pink-300"><div className="flex justify-between items-center"><span className="font-bold text-pink-900">완료한 케이스</span><span className="text-2xl font-black text-pink-700">{Object.values(casesCompleted).reduce((a, b) => a + b, 0)}</span></div></div>
                            </div>
                        </div>
                    )}
                </div>

                <div className="fixed bottom-0 left-0 right-0 bg-gradient-to-t from-amber-900 to-amber-800 border-t-4 border-amber-950 p-2">
                    <div className="max-w-2xl mx-auto grid grid-cols-3 gap-2">
                        <button onClick={() => setCurrentScreen('game')} className={`nav-button rounded-lg p-3 ${currentScreen === 'game' ? 'active' : ''}`}><Home /><div className={`text-xs font-bold ${currentScreen === 'game' ? 'text-amber-900' : 'text-amber-100'}`}>홈</div></button>
                        <button onClick={() => setCurrentScreen('stats')} className={`nav-button rounded-lg p-3 ${currentScreen === 'stats' ? 'active' : ''}`}><Award /><div className={`text-xs font-bold ${currentScreen === 'stats' ? 'text-amber-900' : 'text-amber-100'}`}>통계</div></button>
                        <button onClick={() => { if (confirm('정말 초기화하시겠습니까?')) { localStorage.removeItem(`gameData_${userId}`); window.location.reload(); } }} className="nav-button rounded-lg p-3"><TrendingUp /><div className="text-xs font-bold text-amber-100">초기화</div></button>
                    </div>
                </div>
            </div >
        );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RaiseSocialWorker />);
    </script>
</body>

</html>
