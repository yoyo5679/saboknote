    const { useState, useEffect, useCallback } = React;
    const Home = ({ className }) => React.createElement('span', { className, style: { fontSize: '16px' } }, '🏠');
    const TrendingUp = ({ className }) => React.createElement('span', { className, style: { fontSize: '16px' } }, '📈');
    const Award = ({ className }) => React.createElement('span', { className, style: { fontSize: '16px' } }, '🏆');

      const [activeMinigame, setActiveMinigame] = useState(null);
      const [minigameData, setMinigameData] = useState(null);

      const [skills, setSkills] = useState({ empathy:0, documentation:0, networking:0, counseling:0, crisis:0 });
      const [equipment, setEquipment] = useState({ chair:0, computer:0, coffee:0, bookshelf:0, plant:0, sofa:0 });
      const [clickAnimation, setClickAnimation] = useState(false);
      const [floatingNumbers, setFloatingNumbers] = useState([]);
      const [showSaveIndicator, setShowSaveIndicator] = useState(false);
      const [upgradeTab, setUpgradeTab] = useState('skill');
      const [rankingData, setRankingData] = useState([]);
      const [rankingLoading, setRankingLoading] = useState(false);

      const SUPABASE_URL = 'https://seldrnpohdkggennjieo.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlbGRybnBvaGRrZ2dlbm5qaWVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMzI3MjksImV4cCI6MjA4NzgwODcyOX0.PyzWPa-kwYgh-HmuDELD642TCVn7Ajri54FsR7Ik2Gs';
      const supabaseHeaders = { 'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':`Bearer ${SUPABASE_ANON_KEY}`,'Prefer':'return=representation' };
      const supabase = {
        async upsert(data) {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/rankings`,{method:'POST',headers:{...supabaseHeaders,'Prefer':'resolution=merge-duplicates,return=representation'},body:JSON.stringify(data)});
          return res.ok;
        },
        async fetchTop() {
          const res = await fetch(`${SUPABASE_URL}/rest/v1/rankings?select=*&order=level.desc,total_clicks.desc&limit=20`,{headers:supabaseHeaders});
          if (!res.ok) return [];
          return res.json();
        }
      };

      const [caseTimeLeft, setCaseTimeLeft] = useState(0);
      const [pipetTime, setPipetTime] = useState(0);
      const [mentalCrash, setMentalCrash] = useState(0);
      const [showCaseResult, setShowCaseResult] = useState(null);

      const ranks = [
        {name:'인턴',minLevel:1,salary:50,office:'starter'},
        {name:'사회복지사',minLevel:10,salary:100,office:'basic'},
        {name:'선임 사회복지사',minLevel:20,salary:200,office:'intermediate'},
        {name:'팀장',minLevel:30,salary:400,office:'advanced'},
        {name:'과장',minLevel:40,salary:800,office:'manager'},
        {name:'부장',minLevel:50,salary:1600,office:'senior'},
        {name:'센터장',minLevel:60,salary:3200,office:'director'}
      ];
      const getCurrentRank = () => [...ranks].reverse().find(r => level >= r.minLevel) || ranks[0];

      const caseTypes = [
        {id:'child',name:'아동복지',icon:'👶',color:'from-pink-400 to-rose-500',bonus:1.2,description:'아동 보호 및 지원'},
        {id:'elderly',name:'노인복지',icon:'👴',color:'from-amber-400 to-orange-500',bonus:1.3,description:'노인 돌봄 서비스'},
        {id:'disability',name:'장애인복지',icon:'♿',color:'from-blue-400 to-indigo-500',bonus:1.4,description:'장애인 지원 서비스'},
        {id:'mental',name:'정신건강',icon:'🧠',color:'from-purple-400 to-violet-500',bonus:1.5,description:'정신건강 상담'},
        {id:'family',name:'가족복지',icon:'👨‍👩‍👧‍👦',color:'from-green-400 to-emerald-500',bonus:1.3,description:'가족 지원 서비스'}
      ];

      const skillsData = [
        {id:'empathy',name:'공감능력',icon:'❤️',description:'클릭 파워 +5',effect:(lv)=>`클릭 xp +${lv*5}\n신뢰도 상승`,cost:(lvl)=>Math.floor(150*Math.pow(1.5,lvl))},
        {id:'documentation',name:'문서작성',icon:'📄',description:'자동 수입 +10',effect:(lv)=>`자동 xp +${lv*10}/초\n문서보상 +${lv*5}%`,cost:(lvl)=>Math.floor(200*Math.pow(1.6,lvl))},
        {id:'networking',name:'네트워킹',icon:'🤝',description:'경험치 +15%',effect:(lv)=>`클릭 xp +${lv*15}%\n케이스 빈도 증가`,cost:(lvl)=>Math.floor(300*Math.pow(1.7,lvl))},
        {id:'counseling',name:'상담기술',icon:'💬',description:'케이스 보너스 +10%',effect:(lv)=>`케이스 +${lv*10}%\n상담보상 +${lv*8}%`,cost:(lvl)=>Math.floor(250*Math.pow(1.6,lvl))},
        {id:'crisis',name:'위기개입',icon:'🚨',description:'특수 케이스 +20%',effect:(lv)=>`위기 +${lv*20}%\n긴급 빈도 +${lv*5}%`,cost:(lvl)=>Math.floor(400*Math.pow(1.8,lvl))}
      ];
      const equipmentData = [
        {id:'chair',name:'좋은 의자',icon:'💺',description:'클릭 파워 +3',effect:(lv)=>`클릭 xp +${lv*3}\n장시간 효율`,cost:(lvl)=>Math.floor(100*Math.pow(1.4,lvl))},
        {id:'computer',name:'빠른 컴퓨터',icon:'💻',description:'자동 수입 +15',effect:(lv)=>`자동 xp +${lv*15}/초\n문서속도 향상`,cost:(lvl)=>Math.floor(250*Math.pow(1.5,lvl))},

                        const rankLabel = idx < 3 ? medals[idx] : `${idx+1}위`;
                        const rankInfo = [...ranks].reverse().find(r => entry.level >= r.minLevel) || ranks[0];
                        return (
                          <div key={entry.user_id || idx}
                            style={{ borderRadius:'10px', padding:'8px 10px', border:'2px solid', display:'flex', justifyContent:'space-between', alignItems:'center',
                              background: isMe ? 'linear-gradient(135deg,#fef08a,#fbbf24)' : 'linear-gradient(135deg,#fef3c7,#fed7aa)',
                              borderColor: isMe ? '#d97706' : '#fcd34d' }}>
                            <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                              <span style={{ fontSize:'18px', fontWeight:'900' }}>{rankLabel}</span>
                              <span style={{ fontSize:'16px' }}>{entry.gender==='female' ? '👩' : '👨'}</span>
                              <div>
                                <div style={{ fontSize:'12px', fontWeight:'900', color:'#78350f' }}>
                                  {entry.nickname || rankInfo.name} {isMe ? '(나)' : ''}
                                </div>
                                <div style={{ fontSize:'10px', fontWeight:'700', color:'#92400e' }}>
                                  {rankInfo.name} · 케이스 {entry.cases_total}건
                                </div>
                              </div>
                            </div>
                            <div style={{ textAlign:'right' }}>
                              <div style={{ fontSize:'16px', fontWeight:'900', color:'#78350f' }}>Lv.{entry.level}</div>
                              <div style={{ fontSize:'9px', fontWeight:'700', color:'#92400e' }}>{entry.total_clicks?.toLocaleString()}클릭</div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
                <div style={{ marginTop:'8px', padding:'6px', background:'#fef3c7', borderRadius:'8px', border:'2px solid #fcd34d', flexShrink:0, textAlign:'center' }}>
                  <div style={{ fontSize:'10px', fontWeight:'700', color:'#92400e' }}>💡 저장 시 자동 랭킹 업데이트 · 비밀노트 닉네임 연동</div>
                </div>
              </div>
            )}

            {/* ════ 통계 화면 ════ */}
            {currentScreen === 'stats' && (
              <div className="gold-frame" style={{ flex:1, minHeight:0, display:'flex', flexDirection:'column', padding:'10px' }}>
                <h2 style={{ fontSize:'15px', fontWeight:'900', color:'#78350f', marginBottom:'8px', flexShrink:0, display:'flex', alignItems:'center', gap:'6px' }}>
                  📊 내 통계
                </h2>
                <div style={{ flex:1, minHeight:0, display:'flex', flexDirection:'column', gap:'6px', overflowY:'auto' }}>
                  {[
                    { label:'직급', value:currentRank.name, bg:'#eff6ff', border:'#93c5fd', color:'#1d4ed8', icon:'🏛️' },
                    { label:'현재 레벨', value:level, bg:'#f3e8ff', border:'#c084fc', color:'#7e22ce', icon:'⭐' },
                    { label:'보유 자금', value:`${Math.floor(money).toLocaleString()}원`, bg:'#fef9c3', border:'#facc15', color:'#a16207', icon:'💰' },
                    { label:'클릭 파워', value:`+${clickPower} xp`, bg:'#dcfce7', border:'#4ade80', color:'#15803d', icon:'🖱️' },
                    { label:'자동 수입', value:`+${autoIncome} xp/초`, bg:'#dbeafe', border:'#60a5fa', color:'#1d4ed8', icon:'⏱️' },
                    { label:'총 클릭수', value:totalClicks.toLocaleString(), bg:'#e0e7ff', border:'#a5b4fc', color:'#4338ca', icon:'👆' },
                    { label:'완료 케이스', value:`${Object.values(casesCompleted).reduce((a,b)=>a+b,0)}건`, bg:'#fce7f3', border:'#f9a8d4', color:'#9d174d', icon:'📋' },
                  ].map(({ label, value, bg, border, color, icon }) => (
                    <div key={label} style={{ background:bg, border:`2px solid ${border}`, borderRadius:'8px', padding:'7px 10px', display:'flex', justifyContent:'space-between', alignItems:'center', flexShrink:0 }}>
                      <span style={{ fontSize:'12px', fontWeight:'700', color }}>{icon} {label}</span>
                      <span style={{ fontSize:'14px', fontWeight:'900', color }}>{value}</span>
                    </div>
                  ))}
                  {/* 케이스 상세 */}
                  <div style={{ background:'#fff7ed', border:'2px solid #fdba74', borderRadius:'8px', padding:'7px 10px', flexShrink:0 }}>
                    <div style={{ fontSize:'11px', fontWeight:'900', color:'#c2410c', marginBottom:'4px' }}>📊 케이스 상세</div>
                    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'3px' }}>
                      {caseTypes.map(ct => (
                        <div key={ct.id} style={{ display:'flex', justifyContent:'space-between', padding:'2px 4px', background:'rgba(255,255,255,0.6)', borderRadius:'4px' }}>
                          <span style={{ fontSize:'9px', fontWeight:'700', color:'#92400e' }}>{ct.icon} {ct.name}</span>
                          <span style={{ fontSize:'9px', fontWeight:'900', color:'#78350f' }}>{casesCompleted[ct.id]}건</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  {/* 비밀노트 연동 정보 */}
                  <div style={{ background:'#f0fdf4', border:'2px solid #4ade80', borderRadius:'8px', padding:'7px 10px', flexShrink:0 }}>
                    <div style={{ fontSize:'11px', fontWeight:'900', color:'#15803d', marginBottom:'2px' }}>🔗 비밀노트 연동</div>
                    <div style={{ fontSize:'9px', fontWeight:'700', color:'#166534' }}>닉네임: {nickname || '(미설정 - 비밀노트에서 설정)'}</div>
                    <div style={{ fontSize:'9px', fontWeight:'700', color:'#166534' }}>ID: {userId ? userId.slice(0,16)+'...' : '로딩중...'}</div>
                  </div>
                  <button
                    onClick={() => { if (confirm('정말 초기화하시겠습니까? 모든 게임 데이터가 삭제됩니다.')) { localStorage.removeItem(`gameData_${userId}`); window.location.reload(); } }}
                    style={{ width:'100%', padding:'10px', background:'linear-gradient(135deg,#ef4444,#f43f5e)', color:'white', border:'3px solid #b91c1c', borderRadius:'10px', fontWeight:'900', fontSize:'13px', cursor:'pointer', flexShrink:0 }}>
                    🗑️ 게임 데이터 초기화
                  </button>
                  <div style={{ textAlign:'center', fontSize:'10px', fontWeight:'700', color:'#b45309', flexShrink:0 }}>⚠️ 초기화하면 모든 데이터가 삭제됩니다</div>
                </div>
              </div>
            )}
          </div>

          {/* ─── 하단 네비게이션 ─── */}
          <div style={{ position:'fixed', bottom:0, left:0, right:0, background:'linear-gradient(to top,#78350f,#92400e)', borderTop:'3px solid #451a03', padding:'4px' }}>
            <div style={{ maxWidth:'672px', margin:'0 auto', display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'4px' }}>
              {[
                { screen:'game', icon:'🏠', label:'홈' },
                { screen:'ranking', icon:'📈', label:'랭킹' },
                { screen:'stats', icon:'🏆', label:'정보' },
              ].map(({ screen, icon, label }) => (
                <button key={screen} onClick={() => setCurrentScreen(screen)}
                  className={`nav-button ${currentScreen===screen ? 'active' : ''}`}
                  style={{ padding:'3px', textAlign:'center' }}>
                  <div style={{ fontSize:'16px' }}>{icon}</div>
                  <div style={{ fontSize:'9px', fontWeight:'700', color: currentScreen===screen ? '#78350f' : '#fef3c7' }}>{label}</div>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(RaiseSocialWorker));
  </script>
</body>
</html>
