    .text-amber-100{color:#fef3c7}.text-amber-700{color:#b45309}.text-amber-800{color:#92400e}.text-amber-900{color:#78350f}
    .text-red-600{color:#dc2626}.text-red-700{color:#b91c1c}

    .text-pink-600{color:#db2777}.text-pink-800{color:#9d174d}

    /* ── BG Colors ── */

    .bg-gradient-to-t{background-image:linear-gradient(to top,var(--tw-gradient-stops))}
    .from-amber-900{--tw-gradient-from:#78350f;--tw-gradient-stops:var(--tw-gradient-from),var(--tw-gradient-to,rgba(120,53,15,0))}
    .from-amber-800{--tw-gradient-from:#92400e;--tw-gradient-stops:var(--tw-gradient-from),var(--tw-gradient-to,rgba(146,64,14,0))}

    .from-green-400{--tw-gradient-from:#4ade80;--tw-gradient-stops:var(--tw-gradient-from),var(--tw-gradient-to,rgba(74,222,128,0))}
    .from-green-500{--tw-gradient-from:#22c55e;--tw-gradient-stops:var(--tw-gradient-from),var(--tw-gradient-to,rgba(34,197,94,0))}

    .from-amber-400{--tw-gradient-from:#fbbf24;--tw-gradient-stops:var(--tw-gradient-from),var(--tw-gradient-to,rgba(251,191,36,0))}
    .from-indigo-100{--tw-gradient-from:#e0e7ff;--tw-gradient-stops:var(--tw-gradient-from),var(--tw-gradient-to,rgba(224,231,255,0))}
    .from-yellow-400{--tw-gradient-from:#facc15;--tw-gradient-stops:var(--tw-gradient-from),var(--tw-gradient-to,rgba(250,204,21,0))}
    .to-amber-800{--tw-gradient-to:#92400e}.to-amber-500{--tw-gradient-to:#f59e0b}
    .to-blue-900{--tw-gradient-to:#1e3a8a}.to-emerald-500{--tw-gradient-to:#10b981}

    .to-orange-500{--tw-gradient-to:#f97316}.to-rose-500{--tw-gradient-to:#f43f5e}
    .to-violet-500{--tw-gradient-to:#8b5cf6}.to-emerald-500{--tw-gradient-to:#10b981}

    /* ── Borders ── */

    .border-gray-300{border-color:#d1d5db}.border-amber-300{border-color:#fcd34d}
    .border-amber-700{border-color:#b45309}.border-amber-950{border-color:#451a03}
    .border-blue-300{border-color:#93c5fd}.border-blue-400{border-color:#60a5fa}
    .border-blue-700{border-color:#1d4ed8}.border-blue-800{border-color:#1e40af}.border-blue-950{border-color:#172554}

    /* ── Radius ── */

    .rounded-2xl{border-radius:1rem}.rounded-full{border-radius:9999px}

    /* ── Shadow ── */
    .shadow-lg{box-shadow:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05)}
    .shadow-xl{box-shadow:0 20px 25px -5px rgba(0,0,0,.1),0 10px 10px -5px rgba(0,0,0,.04)}

    /* ── Transitions ── */
    .transition-all{transition:all .15s cubic-bezier(.4,0,.2,1)}
    .transition-transform{transition:transform .15s cubic-bezier(.4,0,.2,1)}.duration-300{transition-duration:.3s}
    .scale-95{transform:scale(.95)}
    .hover\:scale-105:hover{transform:scale(1.05)}
    .hover\:text-blue-900:hover{color:#1e3a8a}
    .hover\:bg-gray-200:hover{background-color:#e5e7eb}
    .outline-none{outline:none}
    .focus\:border-blue-500:focus{border-color:#3b82f6}

    /* ── Animations ── */
    @keyframes bounce{0%,100%{transform:translateY(-25%);animation-timing-function:cubic-bezier(.8,0,1,1)}50%{transform:none;animation-timing-function:cubic-bezier(0,0,.2,1)}}
    .animate-bounce{animation:bounce 1s infinite}

    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .char-bob{animation:bob 2s ease-in-out infinite}
    .char-bob-delay{animation:bob 2s ease-in-out infinite .5s}

    @keyframes float-up{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.2)}}
    .floating-number{animation:float-up 1s ease-out forwards;pointer-events:none}

    @keyframes officeUpgrade{0%{opacity:0;transform:scale(.5) rotate(-5deg)}15%{opacity:1;transform:scale(1.1) rotate(2deg)}25%{transform:scale(1) rotate(0)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(.8) translateY(-30px)}}

    /* ── Game Specific ── */
    .gold-frame{
      background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%);
      border:4px solid #B8860B;border-radius:12px;
      box-shadow:inset 0 2px 4px rgba(255,255,255,.5),0 4px 12px rgba(0,0,0,.3)
    }
    .work-button{
      background:linear-gradient(135deg,#FFD700 0%,#FF8C00 100%);
      border:6px solid #8B4513;border-radius:16px;
      box-shadow:inset 0 4px 8px rgba(255,255,255,.3),0 8px 16px rgba(0,0,0,.4);
      transition:all .2s ease;cursor:pointer
    }
    .work-button:active{transform:translateY(4px);box-shadow:inset 0 4px 8px rgba(255,255,255,.3),0 4px 8px rgba(0,0,0,.4)}
    .nav-button{
      background:linear-gradient(135deg,#8B4513 0%,#A0522D 100%);
      border:3px solid #654321;transition:all .2s ease;cursor:pointer;border-radius:.5rem
    }
    .nav-button.active{background:linear-gradient(135deg,#FFD700 0%,#FFA500 100%);border-color:#B8860B}
    .card-male{
      background:linear-gradient(145deg,#e8f4ff,#bcd8f7);border:4px solid #5b9bd5;
      border-radius:20px;transition:all .25s;cursor:pointer
    }
    .card-male:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 16px 32px rgba(91,155,213,.4)}
    .card-female{
      background:linear-gradient(145deg,#fff0f8,#fac8e8);border:4px solid #e05aa0;
      border-radius:20px;transition:all .25s;cursor:pointer
    }
    .card-female:hover{transform:translateY(-6px) scale(1.03);box-shadow:0 16px 32px rgba(224,90,160,.4)}

<body>
  <div id="root"></div>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback } = React;
const Home = ({className}) => React.createElement('span', {className, style:{fontSize:'16px'}}, '🏠');
const TrendingUp = ({className}) => React.createElement('span', {className, style:{fontSize:'16px'}}, '📈');
const Award = ({className}) => React.createElement('span', {className, style:{fontSize:'16px'}}, '🏆');
const Briefcase = ({className}) => React.createElement('span', {className, style:{fontSize:'16px'}}, '💼');
const X = ({className}) => React.createElement('span', {className, style:{fontSize:'18px',fontWeight:'bold',lineHeight:'1'}}, '✕');

function RaiseSocialWorker() {
  const [currentScreen, setCurrentScreen] = useState('character-select');
  const [gender, setGender] = useState(null);
  const [userId, setUserId] = useState(null);
  
  // 게임 상태
  const [experience, setExperience] = useState(0);
  const [level, setLevel] = useState(1);
  const [money, setMoney] = useState(450);
  const [clickPower, setClickPower] = useState(1);
  const [autoIncome, setAutoIncome] = useState(0);
  const [totalClicks, setTotalClicks] = useState(0);
  
  // 케이스 시스템
  const [currentCase, setCurrentCase] = useState(null);
  const [casesCompleted, setCasesCompleted] = useState({
    child: 0,
    elderly: 0,
    disability: 0,
    mental: 0,
    family: 0
  });
  
  // 미니게임
  const [activeMinigame, setActiveMinigame] = useState(null);
  const [minigameData, setMinigameData] = useState(null);
  const [minigameCooldowns, setMinigameCooldowns] = useState({ counseling: 0, typing: 0, quiz: 0 });
  const [typingInput, setTypingInput] = useState('');
  const [quizInput, setQuizInput] = useState('');
  
  // 업그레이드
  const [skills, setSkills] = useState({
    empathy: 0,
    documentation: 0,
    networking: 0,
    counseling: 0,
    crisis: 0
  });
  
  const [equipment, setEquipment] = useState({
    chair: 0,
    computer: 0,
    coffee: 0,
    bookshelf: 0,
    plant: 0,
    sofa: 0
  });

  const [clickAnimation, setClickAnimation] = useState(false);
  const [floatingNumbers, setFloatingNumbers] = useState([]);
  const [showSaveIndicator, setShowSaveIndicator] = useState(false);
  const [upgradeTab, setUpgradeTab] = useState('skill'); // 'skill' | 'equip'
  const [rankingData, setRankingData] = useState([]);

  // 직급 정보
  const ranks = [
    { name: '인턴', minLevel: 1, salary: 50, office: 'starter' },
    { name: '사회복지사', minLevel: 10, salary: 100, office: 'basic' },
    { name: '선임 사회복지사', minLevel: 20, salary: 200, office: 'intermediate' },
    { name: '팀장', minLevel: 30, salary: 400, office: 'advanced' },
    { name: '과장', minLevel: 40, salary: 800, office: 'manager' },
    { name: '부장', minLevel: 50, salary: 1600, office: 'senior' },
    { name: '센터장', minLevel: 60, salary: 3200, office: 'director' }
  ];

  const getCurrentRank = () => {
    return [...ranks].reverse().find(r => level >= r.minLevel) || ranks[0];
  };

  // 케이스 타입
  const caseTypes = [
    { 
      id: 'child', 
      name: '아동복지', 
      icon: '👶',
      color: 'from-pink-400 to-rose-500',
      bonus: 1.2,
      description: '아동 보호 및 지원'
    },
    { 
      id: 'elderly', 
      name: '노인복지', 
      icon: '👴',
      color: 'from-amber-400 to-orange-500',
      bonus: 1.3,
      description: '노인 돌봄 서비스'
    },
    { 
      id: 'disability', 
      name: '장애인복지', 
      icon: '♿',
      color: 'from-blue-400 to-indigo-500',
      bonus: 1.4,
      description: '장애인 지원 서비스'
    },
    { 
      id: 'mental', 
      name: '정신건강', 
      icon: '🧠',
      color: 'from-purple-400 to-violet-500',
      bonus: 1.5,
      description: '정신건강 상담'
    },
    { 
      id: 'family', 
      name: '가족복지', 
      icon: '👨‍👩‍👧‍👦',
      color: 'from-green-400 to-emerald-500',
      bonus: 1.3,
      description: '가족 지원 서비스'
    }
  ];

  // 스킬 정보
  const skillsData = [
    { 
      id: 'empathy', name: '공감능력', icon: '❤️',
      description: '클릭 파워 +5',
      effect: (lv) => `클릭 1회당 경험치 +${lv*5} 추가\n클라이언트 신뢰도 상승`,
      cost: (lvl) => Math.floor(150 * Math.pow(1.5, lvl))
    },
    { 
      id: 'documentation', name: '문서작성', icon: '📄',
      description: '자동 수입 +10',
      effect: (lv) => `초당 자동 경험치 +${lv*10}\n문서 미니게임 보상 +${lv*5}%`,
      cost: (lvl) => Math.floor(200 * Math.pow(1.6, lvl))
    },
    { 
      id: 'networking', name: '네트워킹', icon: '🤝',
      description: '경험치 +15%',
      effect: (lv) => `모든 클릭 경험치 +${lv*15}%\n기관 연계 케이스 빈도 증가`,
      cost: (lvl) => Math.floor(300 * Math.pow(1.7, lvl))
    },
    { 
      id: 'counseling', name: '상담기술', icon: '💬',
      description: '케이스 보너스 +10%',
      effect: (lv) => `케이스 처리 보너스 +${lv*10}%\n상담 미니게임 보상 +${lv*8}%`,
      cost: (lvl) => Math.floor(250 * Math.pow(1.6, lvl))
    },
    { 
      id: 'crisis', name: '위기개입', icon: '🚨',
      description: '특수 케이스 보너스 +20%',
      effect: (lv) => `위기 케이스 보상 +${lv*20}%\n긴급 케이스 출현 빈도 +${lv*5}%`,
      cost: (lvl) => Math.floor(400 * Math.pow(1.8, lvl))
    }
  ];

  // 장비 정보
  const equipmentData = [
    { 
      id: 'chair', name: '좋은 의자', icon: '💺',
      description: '클릭 파워 +3',
      effect: (lv) => `클릭당 경험치 +${lv*3}\n장시간 업무 효율 유지`,
      cost: (lvl) => Math.floor(100 * Math.pow(1.4, lvl))
    },
    { 
      id: 'computer', name: '빠른 컴퓨터', icon: '💻',

            <Briefcase className="w-5 h-5 mx-auto mb-0.5 text-amber-100" />
            <div className="text-xs font-bold text-amber-100">초기화</div>
          </button>
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(RaiseSocialWorker));
  </script>
