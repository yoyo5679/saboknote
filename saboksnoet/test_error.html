<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Error Catch</title>
<script>
window.onerror = function(msg, url, row, col, err) {
    fetch('/elog?msg=' + encodeURIComponent(msg + ' at line ' + row + ':' + col));
};
</script>
<script src="index.js"></script>
</head>
<body><h1>Test</h1></body>
</html>
